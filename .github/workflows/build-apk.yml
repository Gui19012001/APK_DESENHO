name: Build APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Instalar dependências do Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            curl \
            openjdk-17-jdk \
            python3-pip \
            python3-virtualenv \
            autoconf \
            automake \
            autopoint \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev \
            gettext

      - name: Instalar Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          source "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Instalar Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install buildozer "cython==0.29.34"

          python --version
          buildozer --version
          cython --version
          java -version

      - name: Preparar bibliotecas SMB
        run: |
          rm -rf libs
          mkdir -p libs

          python -m pip install \
            --no-deps \
            --target libs \
            "pyasn1==0.6.1" \
            "pysmb==1.2.13"

          PYTHONPATH="$PWD/libs" python -c \
            "from smb.SMBConnection import SMBConnection; import pyasn1; print('Bibliotecas SMB OK')"

          find libs -maxdepth 2 -type d | sort

      - name: Conferir arquivos
        run: |
          echo "===== BUILD SPEC ====="
          cat buildozer.spec

          echo "===== REQUIREMENTS ====="
          grep -n "^requirements" buildozer.spec

          echo "===== MAIN.PY ====="
          test -f main.py

          echo "===== LIBS SMB ====="
          test -d libs/smb
          test -d libs/nmb
          test -d libs/pyasn1

      - name: Limpar compilação anterior
        run: |
          rm -rf .buildozer
          rm -rf bin
          rm -f build.log

      - name: Gerar APK
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log

      - name: Mostrar erro verdadeiro
        if: always()
        shell: bash
        run: |
          echo "===== PRINCIPAIS ERROS ====="

          grep -nEi \
            "error:|ERROR|Traceback|failed|not found|No module named|Could not|Exception" \
            build.log | tail -n 200 || true

          echo "===== ÚLTIMAS 300 LINHAS ====="
          tail -n 300 build.log || true

      - name: Publicar log completo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn

      - name: Publicar APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: apk-teste-desenho-smb
          path: bin/*.apk
          if-no-files-found: error

      - name: Finalizar com erro
        if: steps.build.outcome == 'failure'
        run: |
          echo "A compilação falhou. Consulte o artefato build-log."
          exit 1
