name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            ant \
            autoconf \
            automake \
            ccache \
            cmake \
            g++ \
            gcc \
            gettext \
            git \
            lbzip2 \
            libffi-dev \
            libltdl-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libssl-dev \
            libtool \
            libtinfo6 \
            make \
            openjdk-17-jdk \
            patch \
            pkg-config \
            python3-dev \
            python3-pip \
            python3-venv \
            unzip \
            wget \
            zip \
            zlib1g-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install \
            setuptools \
            cython==0.29.34 \
            buildozer

      - name: Preparar bibliotecas SMB
        run: |
          rm -rf libs
          mkdir -p libs

          python -m pip install \
            --no-deps \
            --target libs \
            pyasn1==0.6.1 \
            tqdm==4.67.1 \
            pysmb==1.2.13

          echo "===== BIBLIOTECAS INSTALADAS ====="
          find libs -maxdepth 2 -type d | sort

          echo "===== TESTE DE IMPORTAÇÃO ====="
          PYTHONPATH="$PWD/libs" python -c \
            "from smb.SMBConnection import SMBConnection; import pyasn1; import tqdm; print('SMB, pyasn1 e tqdm OK')"

      - name: Conferir configuração
        run: |
          echo "===== BUILD SPEC ====="
          cat buildozer.spec

          echo "===== REQUIREMENTS ====="
          grep -n "^requirements" buildozer.spec

          echo "===== ARQUIVOS SMB ====="
          test -d libs/smb
          test -d libs/nmb
          test -d libs/pyasn1
          test -d libs/tqdm

      - name: Limpar build anterior
        run: |
          rm -rf .buildozer
          rm -rf bin
          rm -f build.log

      - name: Build APK
        shell: bash
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
          if-no-files-found: error
